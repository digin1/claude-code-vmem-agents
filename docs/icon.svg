<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#g)">
    <!-- Connections -->
    <line x1="48" y1="48" x2="20" y2="16" stroke="url(#cg)" stroke-width="2" opacity="0.5"/>
    <line x1="48" y1="48" x2="76" y2="16" stroke="url(#cg)" stroke-width="2" opacity="0.5"/>
    <line x1="48" y1="48" x2="12" y2="52" stroke="url(#cg)" stroke-width="2" opacity="0.4"/>
    <line x1="48" y1="48" x2="84" y2="52" stroke="url(#cg)" stroke-width="2" opacity="0.4"/>
    <line x1="48" y1="48" x2="24" y2="82" stroke="url(#cg)" stroke-width="2" opacity="0.5"/>
    <line x1="48" y1="48" x2="72" y2="82" stroke="url(#cg)" stroke-width="2" opacity="0.5"/>

    <!-- Cross connections -->
    <line x1="20" y1="16" x2="76" y2="16" stroke="url(#cg)" stroke-width="1.3" opacity="0.25"/>
    <line x1="12" y1="52" x2="84" y2="52" stroke="url(#cg)" stroke-width="1.3" opacity="0.2"/>
    <line x1="24" y1="82" x2="72" y2="82" stroke="url(#cg)" stroke-width="1.3" opacity="0.25"/>
    <line x1="20" y1="16" x2="12" y2="52" stroke="url(#cg)" stroke-width="1.1" opacity="0.2"/>
    <line x1="76" y1="16" x2="84" y2="52" stroke="url(#cg)" stroke-width="1.1" opacity="0.2"/>
    <line x1="12" y1="52" x2="24" y2="82" stroke="url(#cg)" stroke-width="1.1" opacity="0.2"/>
    <line x1="84" y1="52" x2="72" y2="82" stroke="url(#cg)" stroke-width="1.1" opacity="0.2"/>

    <!-- Outer nodes -->
    <circle cx="20" cy="16" r="5.5" fill="url(#cg)" opacity="0.7"/>
    <circle cx="76" cy="16" r="5.5" fill="url(#cg)" opacity="0.7"/>
    <circle cx="12" cy="52" r="5" fill="url(#cg)" opacity="0.6"/>
    <circle cx="84" cy="52" r="5" fill="url(#cg)" opacity="0.6"/>
    <circle cx="24" cy="82" r="5.5" fill="url(#cg)" opacity="0.7"/>
    <circle cx="72" cy="82" r="5.5" fill="url(#cg)" opacity="0.7"/>

    <!-- Central node -->
    <circle cx="48" cy="48" r="10" fill="url(#ng)" opacity="0.9"/>
    <circle cx="48" cy="48" r="5.5" fill="white" opacity="0.35"/>
  </g>
</svg>
