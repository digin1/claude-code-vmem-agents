<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="cortex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="node-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neural network icon mark -->
  <g transform="translate(16, 12)" filter="url(#soft-glow)">
    <!-- Connections (drawn first, behind nodes) -->
    <!-- Central hub to outer nodes -->
    <line x1="48" y1="48" x2="20" y2="16" stroke="url(#cortex-grad)" stroke-width="1.8" opacity="0.5"/>
    <line x1="48" y1="48" x2="76" y2="16" stroke="url(#cortex-grad)" stroke-width="1.8" opacity="0.5"/>
    <line x1="48" y1="48" x2="12" y2="52" stroke="url(#cortex-grad)" stroke-width="1.8" opacity="0.4"/>
    <line x1="48" y1="48" x2="84" y2="52" stroke="url(#cortex-grad)" stroke-width="1.8" opacity="0.4"/>
    <line x1="48" y1="48" x2="24" y2="82" stroke="url(#cortex-grad)" stroke-width="1.8" opacity="0.5"/>
    <line x1="48" y1="48" x2="72" y2="82" stroke="url(#cortex-grad)" stroke-width="1.8" opacity="0.5"/>

    <!-- Cross connections (the "network" feel) -->
    <line x1="20" y1="16" x2="76" y2="16" stroke="url(#cortex-grad)" stroke-width="1.2" opacity="0.25"/>
    <line x1="12" y1="52" x2="84" y2="52" stroke="url(#cortex-grad)" stroke-width="1.2" opacity="0.2"/>
    <line x1="24" y1="82" x2="72" y2="82" stroke="url(#cortex-grad)" stroke-width="1.2" opacity="0.25"/>
    <line x1="20" y1="16" x2="12" y2="52" stroke="url(#cortex-grad)" stroke-width="1" opacity="0.2"/>
    <line x1="76" y1="16" x2="84" y2="52" stroke="url(#cortex-grad)" stroke-width="1" opacity="0.2"/>
    <line x1="12" y1="52" x2="24" y2="82" stroke="url(#cortex-grad)" stroke-width="1" opacity="0.2"/>
    <line x1="84" y1="52" x2="72" y2="82" stroke="url(#cortex-grad)" stroke-width="1" opacity="0.2"/>

    <!-- Outer nodes (6 satellite nodes) -->
    <circle cx="20" cy="16" r="5" fill="url(#cortex-grad)" opacity="0.7"/>
    <circle cx="76" cy="16" r="5" fill="url(#cortex-grad)" opacity="0.7"/>
    <circle cx="12" cy="52" r="4.5" fill="url(#cortex-grad)" opacity="0.6"/>
    <circle cx="84" cy="52" r="4.5" fill="url(#cortex-grad)" opacity="0.6"/>
    <circle cx="24" cy="82" r="5" fill="url(#cortex-grad)" opacity="0.7"/>
    <circle cx="72" cy="82" r="5" fill="url(#cortex-grad)" opacity="0.7"/>

    <!-- Central node (larger, brighter — the "core memory") -->
    <circle cx="48" cy="48" r="9" fill="url(#node-glow)" opacity="0.9"/>
    <circle cx="48" cy="48" r="5" fill="white" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <text x="136" y="76" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="52" font-weight="600" letter-spacing="-1.5" fill="url(#cortex-grad)">cortex</text>
</svg>
